<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Che1 Dashboard - History</title>

<link rel="stylesheet" href="../../css/tickets/tickets.css">

<script src="https://kit.fontawesome.com/89f758f97e.js" crossorigin="anonymous"></script>
</head>


<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="../../../src/images/Che1logo.png" class="logo-img">
<span>Che1</span>
</div>

<nav>

<a href="overview.html" id="Overview"><i class="fa-solid fa-chart-line"></i> Overview</a>

<a href="../servers/servers.html"><i class="fa-solid fa-server"></i> Servers</a>

<a href="../tickets/tickets.html"><i class="fa-solid fa-ticket"></i> Tickets</a>

<a href="../giveaways/giveaway.html"><i class="fa-solid fa-gift"></i> Giveaways</a>

<a href="../moderation/moderation.html"><i class="fa-solid fa-shield"></i> Moderation</a>

<a href="#"><i class="fa-solid fa-gear"></i> Settings</a>

<a href="../Leveling/leveling.html"><i class="fa-solid fa-ranking-star"></i> Leveling</a>

</nav>

</aside>


<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<header class="topbar">

<h2>History</h2>

<div class="user">

<img src="https://cdn.discordapp.com/embed/avatars/0.png">

</div>

</header>

<!-- CONTENT -->
<div class="content">
    <div class="accordion1">
        <div class="accordion-item1">
            <div class="accordion-header1">
                <h3>Recent Activities</h3>
            </div>
                <div class="accordion-content1" id="content1">
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Activity Log</h3>
                        <p>View recent server activities and changes.</p>
                        <button class="btn">View Log</button>
                    </div>
                </div>
            </div>
        </div>
    <div class="accordion2">
        <div class="accordion-item2">
            <div class="accordion-header2">
                <h3>Event History</h3>
            </div>
                <div class="accordion-content2" id="content2">
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Past Events</h3>
                        <p>Review historical events and their outcomes.</p>
                        <button class="btn">View Events</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- right sidebar -->

<aside class="right-sidebar">

<nav>

    <a href="statistics.html"><i class="fa-solid fa-chart-bar"></i> Statistics</a>

    <a href="settings.html"><i class="fa-solid fa-cog"></i> Settings</a>

    <a href="alerts.html"><i class="fa-solid fa-bell"></i> Alerts</a>

    <a href="history.html" id="Settings"><i class="fa-solid fa-history"></i> History</a>

</nav>

</aside>

<script src="../../js/accordion.js"></script>

</body>

</html>
