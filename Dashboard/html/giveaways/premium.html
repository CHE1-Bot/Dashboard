<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Che1 Dashboard - Premium</title>

<link rel="stylesheet" href="../../css/tickets/tickets.css">

<script src="https://kit.fontawesome.com/89f758f97e.js" crossorigin="anonymous"></script>
</head>


<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="../../../src/images/Che1logo.png" class="logo-img">
<span>Che1</span>
</div>

<nav>

<a href="../overview/overview.html"><i class="fa-solid fa-chart-line"></i> Overview</a>

<a href="../servers/servers.html"><i class="fa-solid fa-server"></i> Servers</a>

<a href="../tickets/tickets.html"><i class="fa-solid fa-ticket"></i> Tickets</a>

<a href="giveaway.html" id="Giveaways"><i class="fa-solid fa-gift"></i> Giveaways</a>

<a href="../moderation/moderation.html"><i class="fa-solid fa-shield"></i> Moderation</a>

<a href="#"><i class="fa-solid fa-gear"></i> Settings</a>

<a href="../Leveling/leveling.html"><i class="fa-solid fa-ranking-star"></i> Leveling</a>

</nav>

</aside>


<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<header class="topbar">

<h2>Premium</h2>

<div class="user">

<img src="https://cdn.discordapp.com/embed/avatars/0.png">

</div>

</header>

<!-- CONTENT -->
<div class="content">
    <div class="accordion1">
        <div class="accordion-item1">
            <div class="accordion-header1">
                <h3>Premium Features</h3>
            </div>
                <div class="accordion-content1" id="content1">
                    <div class="ticket-overview" id="check-button1">
                        <h3 class="accordion1-texts">Unlimited Giveaways</h3>
                        <input type="checkbox" id="check1" checked disabled>
                        <label for="check1" class="button1"></label>
                    </div>
                    <div class="ticket-overview" id="check-button2">
                        <h3 class="accordion1-texts">Custom Emojis</h3>
                        <input type="checkbox" id="check2" checked disabled>
                        <label for="check2" class="button2"></label>
                    </div>
                    <div class="ticket-overview" id="check-button3">
                        <h3 class="accordion1-texts">Priority Support</h3>
                        <input type="checkbox" id="check3" checked disabled>
                        <label for="check3" class="button3"></label>
                    </div>
                </div>
            </div>
        </div>
    <div class="accordion2">
        <div class="accordion-item2">
            <div class="accordion-header2">
                <h3>Subscription</h3>
            </div>
                <div class="accordion-content2" id="content2">
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Current Plan</h3>
                        <p>Premium Monthly</p>
                    </div>
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Expires</h3>
                        <p>2023-11-01</p>
                    </div>
                    <button class="btn">Renew Subscription</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- right sidebar -->

<aside class="right-sidebar">

<nav>

    <a href="create_giveaway.html"><i class="fa-solid fa-plus-circle"></i> Create Giveaway</a>

    <a href="active_giveaways.html"><i class="fa-solid fa-list"></i> Active Giveaways</a>

    <a href="premium.html" id="Settings"><i class="fa-solid fa-star"></i> Premium</a>

    <a href="blacklist.html"><i class="fa-solid fa-ban"></i> Blacklist</a>

</nav>

</aside>

<script src="../../js/accordion.js"></script>

</body>

</html>
