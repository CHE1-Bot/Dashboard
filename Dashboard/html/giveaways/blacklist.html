<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Che1 Dashboard - Blacklist</title>

<link rel="stylesheet" href="../../css/tickets/tickets.css">

<script src="https://kit.fontawesome.com/89f758f97e.js" crossorigin="anonymous"></script>
</head>


<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="../../../src/images/Che1logo.png" class="logo-img">
<span>Che1</span>
</div>

<nav>

<a href="../overview/overview.html"><i class="fa-solid fa-chart-line"></i> Overview</a>

<a href="../servers/servers.html"><i class="fa-solid fa-server"></i> Servers</a>

<a href="../tickets/tickets.html"><i class="fa-solid fa-ticket"></i> Tickets</a>

<a href="giveaway.html" id="Giveaways"><i class="fa-solid fa-gift"></i> Giveaways</a>

<a href="../moderation/moderation.html"><i class="fa-solid fa-shield"></i> Moderation</a>

<a href="#"><i class="fa-solid fa-gear"></i> Settings</a>

<a href="../Leveling/leveling.html"><i class="fa-solid fa-ranking-star"></i> Leveling</a>

</nav>

</aside>


<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<header class="topbar">

<h2>Blacklist</h2>

<div class="user">

<img src="https://cdn.discordapp.com/embed/avatars/0.png">

</div>

</header>

<!-- CONTENT -->
<div class="content">
    <div class="accordion1">
        <div class="accordion-item1">
            <div class="accordion-header1">
                <h3>Add to Blacklist</h3>
            </div>
                <div class="accordion-content1" id="content1">
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">User ID</h3>
                        <input type="text" placeholder="Enter user ID">
                    </div>
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Reason</h3>
                        <textarea placeholder="Reason for blacklisting"></textarea>
                    </div>
                    <button class="btn">Add to Blacklist</button>
                </div>
            </div>
        </div>
    <div class="accordion2">
        <div class="accordion-item2">
            <div class="accordion-header2">
                <h3>Current Blacklist</h3>
            </div>
                <div class="accordion-content2" id="content2">
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Blacklisted Users</h3>
                        <ul>
                            <li>User123 - Spam</li>
                            <li>User456 - Cheating</li>
                            <li>User789 - Harassment</li>
                        </ul>
                    </div>
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Remove User</h3>
                        <input type="text" placeholder="User ID to remove">
                        <button class="btn">Remove</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- right sidebar -->

<aside class="right-sidebar">

<nav>

    <a href="create_giveaway.html"><i class="fa-solid fa-plus-circle"></i> Create Giveaway</a>

    <a href="active_giveaways.html"><i class="fa-solid fa-list"></i> Active Giveaways</a>

    <a href="premium.html"><i class="fa-solid fa-star"></i> Premium</a>

    <a href="blacklist.html" id="Settings"><i class="fa-solid fa-ban"></i> Blacklist</a>

</nav>

</aside>

<script src="../../js/accordion.js"></script>

</body>

</html>
