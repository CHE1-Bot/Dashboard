<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Che1 Dashboard - Auto Mod</title>

<link rel="stylesheet" href="../../css/tickets/tickets.css">

<script src="https://kit.fontawesome.com/89f758f97e.js" crossorigin="anonymous"></script>
</head>


<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="../../../src/images/Che1logo.png" class="logo-img">
<span>Che1</span>
</div>

<nav>

<a href="../overview/overview.html"><i class="fa-solid fa-chart-line"></i> Overview</a>

<a href="../servers/servers.html"><i class="fa-solid fa-server"></i> Servers</a>

<a href="../tickets/tickets.html"><i class="fa-solid fa-ticket"></i> Tickets</a>

<a href="../giveaways/giveaway.html"><i class="fa-solid fa-gift"></i> Giveaways</a>

<a href="moderation.html" id="Moderation"><i class="fa-solid fa-shield"></i> Moderation</a>

<a href="#"><i class="fa-solid fa-gear"></i> Settings</a>

<a href="../Leveling/leveling.html"><i class="fa-solid fa-ranking-star"></i> Leveling</a>

</nav>

</aside>


<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<header class="topbar">

<h2>Auto Mod</h2>

<div class="user">

<img src="https://cdn.discordapp.com/embed/avatars/0.png">

</div>

</header>

<!-- CONTENT -->
<div class="content">
    <div class="accordion1">
        <div class="accordion-item1">
            <div class="accordion-header1">
                <h3>Spam Detection</h3>
            </div>
                <div class="accordion-content1" id="content1">
                    <div class="ticket-overview" id="check-button1">
                        <h3 class="accordion1-texts">Enable Spam Filter</h3>
                        <input type="checkbox" id="check1">
                        <label for="check1" class="button1"></label>
                    </div>
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Spam Threshold</h3>
                        <input type="number" min="1" max="10" value="5">
                    </div>
                </div>
            </div>
        </div>
    <div class="accordion2">
        <div class="accordion-item2">
            <div class="accordion-header2">
                <h3>Word Filters</h3>
            </div>
                <div class="accordion-content2" id="content2">
                    <div class="ticket-overview" id="check-button2">
                        <h3 class="accordion1-texts">Enable Word Filter</h3>
                        <input type="checkbox" id="check2">
                        <label for="check2" class="button2"></label>
                    </div>
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Banned Words</h3>
                        <textarea placeholder="Enter banned words, one per line"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- right sidebar -->

<aside class="right-sidebar">

<nav>

    <a href="auto_mod.html" id="Settings"><i class="fa-solid fa-robot"></i> Auto Mod</a>

    <a href="manual_actions.html"><i class="fa-solid fa-hand-paper"></i> Manual Actions</a>

    <a href="reports.html"><i class="fa-solid fa-flag"></i> Reports</a>

    <a href="logs.html"><i class="fa-solid fa-file-alt"></i> Logs</a>

</nav>

</aside>

<script src="../../js/accordion.js"></script>

</body>

</html>
