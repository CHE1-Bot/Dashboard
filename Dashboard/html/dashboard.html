<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Che1 Dashboard</title>

<link rel="stylesheet" href="../css/Dashboard.css">

<script src="https://kit.fontawesome.com/89f758f97e.js" crossorigin="anonymous"></script>
</head>


<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="../../src/images/Che1logo.png" class="logo-img">
<span>Che1</span>
</div>

<nav>

<a href="#"><i class="fa-solid fa-chart-line"></i> Overview</a>

<a href="#"><i class="fa-solid fa-server"></i> Servers</a>

<a href="#"><i class="fa-solid fa-ticket"></i> Tickets</a>

<a href="#"><i class="fa-solid fa-gift"></i> Giveaways</a>

<a href="#"><i class="fa-solid fa-shield"></i> Moderation</a>

<a href="#"><i class="fa-solid fa-gear"></i> Settings</a>

<a href="#"><i class="fa-solid fa-ranking-star"></i> Leveling</a>

</nav>

</aside>


<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<header class="topbar">

<h2>Dashboard</h2>

<div class="user">

<img src="https://cdn.discordapp.com/embed/avatars/0.png">

</div>

</header>


<!-- CONTENT -->

<div class="content">

<h1>Welcome to Che1 Dashboard</h1>

<p>Let's get started!</p>


<div class="cards">

<div class="card">
        <h3>Settings</h3>
        <p>Manage your Discord server settings.</p>
</div>



<div class="card">
        <h3>Tickets</h3>
        <p>Configure ticket system.</p>
</div>



<div class="card">
        <h3>Moderation</h3>
        <p>Set moderation tools.</p>
</div>

</div>

</div>

</div>

</div>

<script src="../js/dashboard.js"></script>
</body>
</html>
