<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Che1 Dashboard</title>

<link rel="stylesheet" href="../../css/tickets.css">

<script src="https://kit.fontawesome.com/89f758f97e.js" crossorigin="anonymous"></script>
</head>


<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="../../../src/images/Che1logo.png" class="logo-img">
<span>Che1</span>
</div>

<nav>

<a href="#"><i class="fa-solid fa-chart-line"></i> Overview</a>

<a href="#"><i class="fa-solid fa-server"></i> Servers</a>

<a href="#" id="Tickets"><i class="fa-solid fa-ticket"></i> Tickets</a>

<a href="#"><i class="fa-solid fa-gift"></i> Giveaways</a>

<a href="#"><i class="fa-solid fa-shield"></i> Moderation</a>

<a href="#"><i class="fa-solid fa-gear"></i> Settings</a>

<a href="#"><i class="fa-solid fa-ranking-star"></i> Leveling</a>

</nav>

</aside>


<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<header class="topbar">

<h2>Tickets</h2>

<div class="user">

<img src="https://cdn.discordapp.com/embed/avatars/0.png">

</div>

</header>

<!-- CONTENT -->
<div class="accordion">
    <div class="accordion-item">
        <div class="accordion-header">
            <h3>General</h3>
        </div>
            <div class="accordion-content" id="content1">
                <div class="ticket-overview" id="check-button1">
                    <input type="checkbox" id="check">
                    <label for="check" class="button1"></label>
                </div>
                <div class="ticket-overview" id="check-button2">
                    <input type="checkbox" id="check">
                    <label for="check" class="button1"></label>
                </div>

                <div class="ticket-overview" id="check-button3">
                    <input type="checkbox" id="check">
                    <label for="check" class="button1"></label>
                </div>
                <div class="ticket-overview" id="check-button4">
                    <input type="checkbox" id="check">
                    <label for="check" class="button1"></label>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- right sidebar -->

<aside class="right-sidebar">
<nav>

    <a href="#" id="Settings"><i class="fa-solid fa-gears"></i>Settings</a>

    <a href="#"><i class="fa-regular fa-message"></i>Embed</a>

    <a href="#"><i class="fa-solid fa-people-group"></i>Ticket Staff</a>

    <a href="#"><i class="fa-solid fa-file"></i>Transcripts</a>

    <a href="#"><i class="fa-solid fa-arrow-pointer"></i>Panels</a>

    <a href="#"><i class="fa-solid fa-file-lines"></i>Forms</a>

    <a href="#"><i class="fa-solid fa-tag"></i>Tags</a>

    <a href="#"><i class="fa-solid fa-file-medical"></i>Audit logs</a>

</nav>

</aside>

<script src="../../js/accordion.js"></script>
</body>
</html>
