<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Che1 Dashboard - Permissions</title>

<link rel="stylesheet" href="../../css/tickets/tickets.css">

<script src="https://kit.fontawesome.com/89f758f97e.js" crossorigin="anonymous"></script>
</head>


<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<img src="../../../src/images/Che1logo.png" class="logo-img">
<span>Che1</span>
</div>

<nav>

<a href="../overview/overview.html"><i class="fa-solid fa-chart-line"></i> Overview</a>

<a href="servers.html" id="Servers"><i class="fa-solid fa-server"></i> Servers</a>

<a href="../tickets/tickets.html"><i class="fa-solid fa-ticket"></i> Tickets</a>

<a href="../giveaways/giveaway.html"><i class="fa-solid fa-gift"></i> Giveaways</a>

<a href="../moderation/moderation.html"><i class="fa-solid fa-shield"></i> Moderation</a>

<a href="#"><i class="fa-solid fa-gear"></i> Settings</a>

<a href="../Leveling/leveling.html"><i class="fa-solid fa-ranking-star"></i> Leveling</a>

</nav>

</aside>


<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<header class="topbar">

<h2>Permissions</h2>

<div class="user">

<img src="https://cdn.discordapp.com/embed/avatars/0.png">

</div>

</header>

<!-- CONTENT -->
<div class="content">
    <div class="accordion1">
        <div class="accordion-item1">
            <div class="accordion-header1">
                <h3>Role Permissions</h3>
            </div>
                <div class="accordion-content1" id="content1">
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Select Role</h3>
                        <select>
                            <option>Admin</option>
                            <option>Moderator</option>
                            <option>Member</option>
                        </select>
                    </div>
                    <div class="ticket-overview" id="check-button1">
                        <h3 class="accordion1-texts">Manage Server</h3>
                        <input type="checkbox" id="check1">
                        <label for="check1" class="button1"></label>
                    </div>
                    <div class="ticket-overview" id="check-button2">
                        <h3 class="accordion1-texts">Kick Members</h3>
                        <input type="checkbox" id="check2">
                        <label for="check2" class="button2"></label>
                    </div>
                    <div class="ticket-overview" id="check-button3">
                        <h3 class="accordion1-texts">Ban Members</h3>
                        <input type="checkbox" id="check3">
                        <label for="check3" class="button3"></label>
                    </div>
                </div>
            </div>
        </div>
    <div class="accordion2">
        <div class="accordion-item2">
            <div class="accordion-header2">
                <h3>Channel Permissions</h3>
            </div>
                <div class="accordion-content2" id="content2">
                    <div class="ticket-overview">
                        <h3 class="accordion1-texts">Select Channel</h3>
                        <select>
                            <option>#general</option>
                            <option>#announcements</option>
                            <option>#moderation</option>
                        </select>
                    </div>
                    <div class="ticket-overview" id="check-button4">
                        <h3 class="accordion1-texts">Read Messages</h3>
                        <input type="checkbox" id="check4">
                        <label for="check4" class="button4"></label>
                    </div>
                    <div class="ticket-overview" id="check-button5">
                        <h3 class="accordion1-texts">Send Messages</h3>
                        <input type="checkbox" id="check5">
                        <label for="check5" class="button5"></label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- right sidebar -->

<aside class="right-sidebar">

<nav>

    <a href="add_server.html"><i class="fa-solid fa-plus"></i> Add Server</a>

    <a href="manage_roles.html"><i class="fa-solid fa-users-cog"></i> Manage Roles</a>

    <a href="permissions.html" id="Settings"><i class="fa-solid fa-key"></i> Permissions</a>

    <a href="backup.html"><i class="fa-solid fa-save"></i> Backup</a>

</nav>

</aside>

<script src="../../js/accordion.js"></script>

</body>

</html>
